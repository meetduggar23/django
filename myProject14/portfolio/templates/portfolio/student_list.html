<!doctype>
<html lang="en">
    <head>
    
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Student List</title>
    </head>
    <body>
        <h1>Student List</h1>
        {% if students %}
        <table>
            <thead>
                
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
            </tr>
            </thead>
            <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.age }}</td>
                <td>{{ student.email }}</td>
            </tr>

            {% endfor %}
            </tbody>
        </table>

        {% else %}
        <p>No students found.</p>
        {% endif %}
    </body>
</html>
