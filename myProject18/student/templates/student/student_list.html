
<!DOCTYPE html>
<html>
<head>
<title>Student List</title>
<style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        table{
            width:60%;
            margin:auto;
            border-collapse: collapse;
            background:white;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        tr:hover{
            background:#f1f1f1;
        }

        h2{
            text-align:center;
        }
    </style>
</head>
<body>

<h1>Student List</h1>

<a href="{% url 'student_create' %}">Add Student</a>

<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Age</th>
<th>Actions</th>
</tr>

{% for student in students %}
<tr>
<td>
<a href="{% url 'student_detail' student.id %}">
{{ student.name }}
</a>
</td>
<td>{{ student.email }}</td>
<td>{{ student.age }}</td>

<td>
<a href="{% url 'student_update' student.id %}">Edit</a> |
<a href="{% url 'student_delete' student.id %}">Delete</a>
</td>

</tr>
{% endfor %}

</table>

</body>
</html>
